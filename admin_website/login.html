<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resilience AI — Admin Login</title>
  <link rel="icon" href="logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-800 to-green-600 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center mb-4">
        <img src="logo.png" alt="App Logo" class="w-16 h-16 rounded-2xl shadow-lg" />
      </div>
      <h1 class="text-2xl font-bold text-white">Resilience AI</h1>
      <p class="text-green-200 text-sm mt-1">Admin Dashboard</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8">
      <!-- Tabs -->
      <div class="flex border-b border-gray-200 mb-6">
        <button id="tab-login" onclick="switchTab('login')"
          class="flex-1 pb-3 text-sm font-semibold text-green-700 border-b-2 border-green-700">
          Sign In
        </button>
        <button id="tab-register" onclick="switchTab('register')"
          class="flex-1 pb-3 text-sm font-semibold text-gray-400 border-b-2 border-transparent hover:text-gray-600">
          Register
        </button>
      </div>

      <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm"></div>

      <!-- Sign In Form -->
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" id="login-username" required autocomplete="username"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 text-sm"
            placeholder="admin" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="login-password" required autocomplete="current-password"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 text-sm"
            placeholder="••••••••" />
        </div>
        <button type="submit" id="login-btn"
          class="w-full bg-green-700 hover:bg-green-800 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors text-sm">
          Sign In
        </button>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="space-y-4 hidden">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" id="reg-username" required autocomplete="username"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 text-sm"
            placeholder="new_admin" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password <span class="text-gray-400 font-normal">(min 6 characters)</span></label>
          <input type="password" id="reg-password" required autocomplete="new-password"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 text-sm"
            placeholder="••••••••" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <input type="password" id="reg-confirm" required autocomplete="new-password"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 text-sm"
            placeholder="••••••••" />
        </div>
        <button type="submit" id="reg-btn"
          class="w-full bg-green-700 hover:bg-green-800 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors text-sm">
          Create Account
        </button>
      </form>
    </div>
  </div>

  <script src="js/api.js?v=4"></script>
  <script src="js/auth.js?v=4"></script>
  <script>
    const _tok = localStorage.getItem('admin_token');
    if (_tok) {
      try {
        const _p = JSON.parse(atob(_tok.split('.')[1]));
        if (_p.exp * 1000 > Date.now()) window.location.href = 'index.html';
        else localStorage.removeItem('admin_token');
      } catch(_) { localStorage.removeItem('admin_token'); }
    }
    if (new URLSearchParams(location.search).get('expired')) {
      document.addEventListener('DOMContentLoaded', () => {
        const el = document.getElementById('error-msg');
        el.textContent = 'Session expired. Please sign in again.';
        el.classList.remove('hidden');
      });
    }

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('login-form').classList.toggle('hidden', !isLogin);
      document.getElementById('register-form').classList.toggle('hidden', isLogin);
      document.getElementById('tab-login').className = `flex-1 pb-3 text-sm font-semibold border-b-2 ${isLogin ? 'text-green-700 border-green-700' : 'text-gray-400 border-transparent hover:text-gray-600'}`;
      document.getElementById('tab-register').className = `flex-1 pb-3 text-sm font-semibold border-b-2 ${!isLogin ? 'text-green-700 border-green-700' : 'text-gray-400 border-transparent hover:text-gray-600'}`;
      document.getElementById('error-msg').classList.add('hidden');
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.textContent = 'Signing in...'; btn.disabled = true;
      document.getElementById('error-msg').classList.add('hidden');
      try {
        const data = await api.login(
          document.getElementById('login-username').value,
          document.getElementById('login-password').value
        );
        localStorage.setItem('admin_token', data.access_token);
        window.location.href = 'index.html';
      } catch (err) {
        showError(err.message || 'Login failed. Check credentials.');
        btn.textContent = 'Sign In'; btn.disabled = false;
      }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;
      if (password !== confirm) { showError('Passwords do not match.'); return; }
      const btn = document.getElementById('reg-btn');
      btn.textContent = 'Creating...'; btn.disabled = true;
      document.getElementById('error-msg').classList.add('hidden');
      try {
        const data = await api.register(
          document.getElementById('reg-username').value,
          password
        );
        localStorage.setItem('admin_token', data.access_token);
        window.location.href = 'index.html';
      } catch (err) {
        showError(err.message || 'Registration failed.');
        btn.textContent = 'Create Account'; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
